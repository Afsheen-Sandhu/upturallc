<div class="booking-modal-overlay" id="bookingModal">
    <div class="booking-modal-card">
        <button class="booking-modal-close" id="closeBookingModal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12"></path>
            </svg>
        </button>

        <div class="booking-modal-header">
            <h2 class="booking-modal-title">Book a <span class="highlight">Strategy Call</span></h2>
            <p class="booking-modal-subtitle">Select a time that works best for you. We'll discuss your goals and how AI
                can accelerate your business.</p>
        </div>

        <form class="booking-modal-form" id="bookingForm">
            <div class="booking-form-grid">
                <div class="booking-form-group">
                    <label class="booking-label">Full Name</label>
                    <input type="text" id="booking-name" class="booking-input" placeholder="John Doe" required>
                </div>
                <div class="booking-form-group">
                    <label class="booking-label">Email Address</label>
                    <input type="email" id="booking-email" class="booking-input" placeholder="john@company.com"
                        required>
                </div>
                <div class="booking-form-group">
                    <label class="booking-label">Phone Number</label>
                    <input type="tel" id="booking-phone" class="booking-input" placeholder="+1 (555) 000-0000">
                </div>
                <div class="booking-form-group">
                    <label class="booking-label">Company</label>
                    <input type="text" id="booking-company" class="booking-input" placeholder="Your Company Name">
                </div>
            </div>

            <div class="booking-form-row">
                <div class="booking-form-group">
                    <label class="booking-label">Preferred Date</label>
                    <input type="date" id="booking-date" class="booking-input" required>
                </div>
                <div class="booking-form-group">
                    <label class="booking-label">Time (EST)</label>
                    <select id="booking-time" class="booking-input" required>
                        <option value="" disabled selected>Select a time</option>
                        <option value="09:00">09:00 AM - 09:30 AM</option>
                        <option value="09:30">09:30 AM - 10:00 AM</option>
                        <option value="10:00">10:00 AM - 10:30 AM</option>
                        <option value="10:30">10:30 AM - 11:00 AM</option>
                        <option value="11:00">11:00 AM - 11:30 AM</option>
                        <option value="11:30">11:30 AM - 12:00 PM</option>
                        <option value="12:00">12:00 PM - 12:30 PM</option>
                        <option value="12:30">12:30 PM - 01:00 PM</option>
                        <option value="13:00">01:00 PM - 01:30 PM</option>
                        <option value="13:30">01:30 PM - 02:00 PM</option>
                        <option value="14:00">02:00 PM - 02:30 PM</option>
                        <option value="14:30">02:30 PM - 03:00 PM</option>
                        <option value="15:00">03:00 PM - 03:30 PM</option>
                        <option value="15:30">15:30 PM - 04:00 PM</option>
                        <option value="16:00">16:00 PM - 16:30 PM</option>
                        <option value="16:30">16:30 PM - 17:00 PM</option>
                        <option value="17:00">17:00 PM - 17:30 PM</option>
                        <option value="17:30">17:30 PM - 18:00 PM</option>
                    </select>
                </div>
            </div>

            <div class="booking-form-group">
                <label class="booking-label">How can we help?</label>
                <textarea id="booking-message" class="booking-textarea"
                    placeholder="Tell us about your project or goals..."></textarea>
            </div>

            <button type="submit" class="booking-submit-btn" id="bookingSubmitBtn">
                <div class="booking-spinner" id="bookingSpinner"></div>
                <span class="booking-btn-text">Schedule Meeting</span>
            </button>
        </form>

        <div class="booking-success-message" id="bookingSuccess">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h3>Request Sent!</h3>
            <p>Our team will review the slot and send you a confirmation email shortly.</p>
            <button class="booking-success-close" onclick="closeBookingModal()">Close</button>
        </div>
    </div>
</div>
