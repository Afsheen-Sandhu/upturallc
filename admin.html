<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Uptura</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        :root {
            --primary: #FF3C00;
            --primary-gradient: linear-gradient(135deg, #FF3C00 0%, #FF5722 100%);
            --dark: #1a1a1a;
            --bg: #EEE9E3;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            opacity: 0;
            transform: translateY(20px);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            width: 120px;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid #ddd;
            background: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--primary);
            background: #fff;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-gradient);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 60, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 60, 0, 0.3);
        }

        .error-msg {
            color: #ff3333;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 16px;
            display: none;
        }

        .background-blobs {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: #FF3C00;
            top: -100px;
            right: -100px;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: #FF5722;
            bottom: -200px;
            left: -100px;
        }
    </style>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-card" id="loginCard">
        <div class="logo">
            <img src="https://cdn.prod.website-files.com/6956bd5acabb30f84175fa1b/695861fb4062b42c0bd5c2cd_Logo%20Main.png"
                alt="Uptura">
        </div>
        <h2 class="login-title">Admin Dashboard</h2>
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                <span>Login</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
            <div class="error-msg" id="errorMsg">Invalid credentials. Please try again.</div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already logged in
            if (localStorage.getItem('uptura_admin_auth') === 'true') {
                window.location.href = 'admin-dashboard.html';
                return;
            }

            // Animation
            gsap.to('#loginCard', {
                opacity: 1,
                y: 0,
                duration: 1,
                ease: 'expo.out'
            });

            const loginForm = document.getElementById('loginForm');
            const errorMsg = document.getElementById('errorMsg');

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                // Check stored password (for settings page update logic later)
                const storedPass = localStorage.getItem('uptura_admin_pass') || 'qamaruptura12!';

                if (email === 'admin@uptura.net' && password === storedPass) {
                    localStorage.setItem('uptura_admin_auth', 'true');
                    gsap.to('#loginCard', {
                        opacity: 0,
                        scale: 0.95,
                        duration: 0.4,
                        onComplete: () => {
                            window.location.href = 'admin-dashboard.html';
                        }
                    });
                } else {
                    errorMsg.style.display = 'block';
                    gsap.fromTo('#loginCard', { x: -10 }, { x: 10, duration: 0.1, repeat: 5, yoyo: true });
                }
            });
        });
    </script>
</body>

</html>
